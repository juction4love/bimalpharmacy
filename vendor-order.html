<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- SEO Meta Tags -->
  <title>Smart Order Slip | बिमल फार्मेसी - भरतपुर-७, चितवन</title>
  <meta name="description" content="बिमल फार्मेसीको आधिकारिक डिजिटल खरिद अर्डर स्लिप। सप्लायरलाई WhatsApp मार्फत अर्डर पठाउनुहोस्।">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== PHARMACY HEADER CARD ========== -->
  <div class="vendor-header-card">
    <div class="vendor-logo-circle">
      <img src="https://raw.githubusercontent.com/juction4love/bimalpharmacy/main/logo.svg" alt="Bimal Pharmacy Logo">
    </div>
    <div class="vendor-brand-info">
      <h1>बिमल फार्मेसी</h1>
      <p>भरतपुर-७, चितवन (क्यान्सर अस्पताल रोड)</p>
    </div>
  </div>

  <!-- ========== ORDER APP ========== -->
  <div id="orderApp" class="order-app">
    
    <!-- App Header -->
    <div class="app-header-row">
      <div class="app-title-area">
        <h2><i class="fas fa-file-invoice-dollar"></i> Smart Order Slip</h2>
        <p>आधिकारिक डिजिटल खरिद अर्डर</p>
      </div>
      <button onclick="toggleDarkMode()" class="dark-toggle-btn">
        <i class="fas fa-moon"></i>
      </button>
    </div>
    
    <!-- Date & Order ID -->
    <div class="order-meta-bar">
      <span><i class="far fa-calendar-check"></i> मिति: <span id="currentDate"></span></span>
      <span class="order-id-text">ID: <span id="orderID"></span></span>
    </div>

    <!-- Vendor Name Input -->
    <div class="input-group-order">
      <label>विक्रेता / सप्लायरको नाम:</label>
      <div class="input-with-icon">
        <i class="fas fa-truck-moving input-icon-left"></i>
        <input type="text" id="vendorName" placeholder="सप्लायर वा कम्पनीको नाम">
      </div>
    </div>

    <!-- ========== ORDER TABLE ========== -->
    <div class="input-group-order">
      <label>सामानको विवरण (Items Table):</label>
      
      <table class="order-table" id="orderTable">
        <thead>
          <tr>
            <th width="5%">#</th>
            <th width="35%">औषधी / सामानको नाम</th>
            <th width="15%">Strength</th>
            <th width="12%">Qty</th>
            <th width="23%">Remarks</th>
            <th width="10%"></th>
          </tr>
        </thead>
        <tbody id="orderTableBody">
          <tr>
            <td class="row-num">1</td>
            <td><input type="text" class="table-input item-name" placeholder="औषधीको नाम"></td>
            <td><input type="text" class="table-input item-strength" placeholder="उदा: 500mg"></td>
            <td><input type="text" class="table-input item-qty" placeholder="उदा: 10"></td>
            <td><input type="text" class="table-input item-remarks" placeholder="टिप्पणी"></td>
            <td><button class="row-delete-btn" onclick="deleteRow(this)" title="Delete">✕</button></td>
          </tr>
        </tbody>
      </table>
      
      <button onclick="addRow()" class="btn-add-row">
        <i class="fas fa-plus-circle"></i> सामान थप्नुहोस्
      </button>
    </div>

    <!-- Main Action Buttons -->
    <div class="btn-row-two">
      <button onclick="sendToMe()" class="btn-wa-my">
        <i class="fab fa-whatsapp"></i> My WhatsApp
      </button>
      <button onclick="chooseSupplier()" class="btn-wa-supplier">
        <i class="fas fa-share-alt"></i> Any Supplier
      </button>
    </div>

    <!-- Secondary Action Buttons -->
    <div class="btn-row-three">
      <button onclick="printOrder()" class="btn-print">
        <i class="fas fa-print"></i> Print
      </button>
      <button onclick="generatePDF()" class="btn-pdf">
        <i class="fas fa-file-pdf"></i> PDF
      </button>
      <button onclick="nativeShare()" class="btn-share">
        <i class="fas fa-share"></i> Share
      </button>
    </div>

    <!-- Clear Button -->
    <button onclick="clearForm()" class="btn-clear">
      <i class="fas fa-eraser"></i> Clear Form (खाली गर्नुहोस्)
    </button>

  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // 0. Nepali Date Converter (AD to BS)
    function toNepaliDate(date) {
      const nepaliMonths = [
        "बैशाख", "जेठ", "असार", "साउन", "भदौ", "असोज",
        "कार्तिक", "मंसिर", "पौष", "माघ", "फागुन", "चैत्र"
      ];
      
      const bsYear = date.getFullYear() + 57;
      const bsMonth = date.getMonth();
      const bsDay = date.getDate() + 15;
      
      const daysInMonth = [31, 31, 32, 31, 31, 30, 30, 30, 29, 30, 30, 30];
      let finalDay = bsDay;
      let finalMonth = bsMonth;
      let finalYear = bsYear;
      
      while (finalDay > daysInMonth[finalMonth]) {
        finalDay -= daysInMonth[finalMonth];
        finalMonth++;
        if (finalMonth > 11) {
          finalMonth = 0;
          finalYear++;
        }
      }
      
      return `${finalYear} ${nepaliMonths[finalMonth]} ${finalDay}`;
    }

    // 1. Table Management
    function addRow() {
      const tbody = document.getElementById('orderTableBody');
      const rowCount = tbody.querySelectorAll('tr').length + 1;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="row-num">${rowCount}</td>
        <td><input type="text" class="table-input item-name" placeholder="औषधीको नाम"></td>
        <td><input type="text" class="table-input item-strength" placeholder="उदा: 500mg"></td>
        <td><input type="text" class="table-input item-qty" placeholder="उदा: 10"></td>
        <td><input type="text" class="table-input item-remarks" placeholder="टिप्पणी"></td>
        <td><button class="row-delete-btn" onclick="deleteRow(this)" title="Delete">✕</button></td>
      `;
      tbody.appendChild(tr);
      updateRowNumbers();
    }

    function deleteRow(btn) {
      const tbody = document.getElementById('orderTableBody');
      if (tbody.querySelectorAll('tr').length > 1) {
        btn.closest('tr').remove();
        updateRowNumbers();
      }
    }

    function updateRowNumbers() {
      document.querySelectorAll('#orderTableBody .row-num').forEach((td, i) => td.textContent = i + 1);
    }

    function getTableData() {
      const rows = document.querySelectorAll('#orderTableBody tr');
      let items = '';
      rows.forEach((row, i) => {
        const name = row.querySelector('.item-name').value.trim();
        const strength = row.querySelector('.item-strength').value.trim();
        const qty = row.querySelector('.item-qty').value.trim();
        const remarks = row.querySelector('.item-remarks').value.trim();
        if (name) {
          items += `${i + 1}. ${name}`;
          if (strength) items += ` (${strength})`;
          if (qty) items += ` - Qty: ${qty}`;
          if (remarks) items += ` [${remarks}]`;
          items += '\n';
        }
      });
      return items.trim();
    }

    function getTableHTML() {
      const rows = document.querySelectorAll('#orderTableBody tr');
      let html = '<table style="width:100%;border-collapse:collapse;margin:15px 0;font-size:14px;"><thead><tr style="background:#2e7d32;color:white;"><th>#</th><th>Item</th><th>Strength</th><th>Qty</th><th>Remarks</th></tr></thead><tbody>';
      rows.forEach((row, i) => {
        const name = row.querySelector('.item-name').value.trim();
        const strength = row.querySelector('.item-strength').value.trim();
        const qty = row.querySelector('.item-qty').value.trim();
        const remarks = row.querySelector('.item-remarks').value.trim();
        if (name) {
          html += `<tr style="border-bottom:1px solid #ddd;"><td style="padding:8px;">${i+1}</td><td style="padding:8px;">${name}</td><td style="padding:8px;">${strength||'-'}</td><td style="padding:8px;">${qty||'-'}</td><td style="padding:8px;">${remarks||'-'}</td></tr>`;
        }
      });
      html += '</tbody></table>';
      return html;
    }

    // 2. Setup with Nepali Date
    function setupOrder() {
      const now = new Date();
      const nepaliDate = toNepaliDate(now);
      document.getElementById('currentDate').innerText = nepaliDate;
      
      const dateID = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
      document.getElementById('orderID').innerText = `BIMAL-${dateID}-${Math.floor(1000 + Math.random() * 9000)}`;
    }
    setupOrder();

    // 3. Message Logic - Simple Purchase Order
    function createMessage() {
      const items = getTableData();
      const id = document.getElementById('orderID').innerText;
      const date = document.getElementById('currentDate').innerText;

      if (!items) { alert("कृपया कम्तिमा एउटा सामान भर्नुहोस्।"); return null; }

      return "📋 *PURCHASE ORDER*%0A" +
             "━━━━━━━━━━━━━━━━━━%0A" +
             "📅 मिति: " + date + "%0A" +
             "🔢 Order ID: #" + id + "%0A" +
             "🏥 बिमल फार्मेसी, भरतपुर-७%0A" +
             "📞 ९८५५०६५३२७%0A" +
             "━━━━━━━━━━━━━━━━━━%0A%0A" +
             "📌 *ORDER ITEMS:*%0A" +
             encodeURIComponent(items) + "%0A%0A" +
             "━━━━━━━━━━━━━━━━━━%0A" +
             "कृपया उपलब्धता जानकारी दिनुहोला।%0A" +
             "धन्यवाद।";
    }

    // 4. Print Function
    function printOrder() {
      const vendor = document.getElementById('vendorName').value || "N/A";
      const id = document.getElementById('orderID').innerText;
      const date = document.getElementById('currentDate').innerText;
      const tableHTML = getTableHTML();
      if (!getTableData()) return alert("Items list is empty!");

      const win = window.open('', '', 'height=700,width=900');
      win.document.write(`<html><head><title>Order #${id}</title><link rel="stylesheet" href="style.css"></head><body><div class="bill-container"><div class="hd"><h1>बिमल फार्मेसी</h1><p>भरतपुर-७, चितवन | फोन: ९८५५०६५३२७</p><h2>PURCHASE ORDER</h2></div><div class="meta"><div><strong>To:</strong> ${vendor}</div><div style="text-align:right;"><strong>मिति:</strong> ${date}<br><strong>ID:</strong> #${id}</div></div><div style="font-weight:bold;margin-bottom:10px;">Items:</div>${tableHTML}<div class="footer"><p>बिमल फार्मेसी - आधिकारिक अर्डर</p><strong>Bimal Lamichhane</strong></div></div></body></html>`);
      win.document.close();
      win.focus();
      setTimeout(() => { win.print(); win.close(); }, 600);
    }

    // 5. Other Functions
    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(14);
      doc.text("BIMAL PHARMACY - PURCHASE ORDER", 10, 15);
      doc.setFontSize(10);
      doc.text("ID: " + document.getElementById('orderID').innerText, 10, 25);
      doc.text("Date: " + document.getElementById('currentDate').innerText, 10, 35);
      doc.text("Items:", 10, 45);
      const items = getTableData().split('\n');
      let y = 55;
      items.forEach(item => {
        if (y > 270) { doc.addPage(); y = 20; }
        doc.text(item, 10, y);
        y += 7;
      });
      doc.save(`Bimal_Order_${document.getElementById('orderID').innerText}.pdf`);
    }

    function toggleDarkMode() { document.getElementById('orderApp').classList.toggle('dark-mode'); }
    function sendToMe() { const msg = createMessage(); if(msg) window.open("https://wa.me/9779855065327?text=" + msg, '_blank'); }
    function chooseSupplier() { const msg = createMessage(); if(msg) window.open("https://wa.me/?text=" + msg, '_blank'); }
    async function nativeShare() { const msg = createMessage(); if(msg) navigator.share({title:'Order Slip', text:decodeURIComponent(msg)}); }
    
    function clearForm() { 
      if(confirm("नयाँ अर्डरका लागि फर्म खाली गर्ने?")) { 
        document.getElementById('vendorName').value = ""; 
        document.getElementById('orderTableBody').innerHTML = `<tr><td class="row-num">1</td><td><input type="text" class="table-input item-name" placeholder="औषधीको नाम"></td><td><input type="text" class="table-input item-strength" placeholder="उदा: 500mg"></td><td><input type="text" class="table-input item-qty" placeholder="उदा: 10"></td><td><input type="text" class="table-input item-remarks" placeholder="टिप्पणी"></td><td><button class="row-delete-btn" onclick="deleteRow(this)" title="Delete">✕</button></td></tr>`;
        setupOrder(); 
      } 
    }
  </script>
</body>
</html>
